<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Hexacrimson Labs">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55"/>
      <stop offset="55%" stop-color="#DC143C"/>
      <stop offset="100%" stop-color="#8B0A24"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark plate -->
  <rect width="64" height="64" rx="14" fill="#0A0C10"/>
  <!-- Crimson hexagon (agent / hex brand) -->
  <path
    filter="url(#glow)"
    fill="url(#g)"
    d="M32 8 L52 19.5 V40.5 L32 52 L12 40.5 V19.5 Z"
  />
  <!-- Inner cut for tech look -->
  <path
    fill="#0A0C10"
    d="M32 18 L44 25 V39 L32 46 L20 39 V25 Z"
  />
  <!-- Center node -->
  <circle cx="32" cy="32" r="5.5" fill="url(#g)"/>
  <!-- Orbit ticks -->
  <circle cx="32" cy="22" r="1.6" fill="#FF6B8A"/>
  <circle cx="41" cy="37" r="1.6" fill="#FF6B8A"/>
  <circle cx="23" cy="37" r="1.6" fill="#FF6B8A"/>
</svg>
