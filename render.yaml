services:
  - type: web
    # Service name becomes the Render URL: https://hexacrimson-labs.onrender.com
    # (avoid random suffixes like -q1ie by using a clean unique name)
    name: hexacrimson-labs
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_URL
        value: https://hexacrimson-labs.onrender.com
