services:
  - type: web
    name: hexacrimson-labs
    runtime: node
    rootDir: .
    plan: free
    buildCommand: |
      if [ -f package.json ]; then
        npm install
      else
        cd hexa-agent && npm install
      fi
    startCommand: |
      if [ -f package.json ]; then
        npm start
      else
        cd hexa-agent && npm start
      fi
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_URL
        value: https://hexacrimson-labs.onrender.com
